<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vero-optimoija — Listaamaton Oy</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080e1a;--panel:#0d1526;--panel2:#111d33;--border:#1a2a42;--text:#d8e4f0;--muted:#6b84a3;--accent:#4daeff;--green:#2ddc6f;--orange:#f0a030;--red:#e85454;--cyan:#44e8d0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.mono{font-family:'JetBrains Mono',monospace}
input[type=number]{-moz-appearance:textfield;width:100%;padding:9px 11px;background:#0a1225;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border .2s}
input[type=number]:focus{border-color:var(--accent)}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#1a3050;border-radius:4px}
.wrap{max-width:1600px;margin:0 auto;padding:16px}
.header{background:linear-gradient(180deg,#0e1830,var(--bg));border-bottom:1px solid var(--border);padding:16px 20px 12px;position:sticky;top:0;z-index:100}
.header h1{font-size:17px;font-weight:700;color:var(--accent);letter-spacing:.8px}
.header p{font-size:12px;color:var(--muted);margin:3px 0 10px}
.tabs{display:flex;gap:4px;flex-wrap:wrap}
.tab{padding:7px 14px;background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:.3px;transition:all .15s}
.tab.active{background:#142a4a;border-color:#1e4a7a;color:var(--accent)}
.layout{display:flex;gap:0}
.sidebar{width:340px;min-width:300px;max-height:calc(100vh - 90px);overflow-y:auto;padding:14px;border-right:1px solid var(--border);background:#0a1220;flex-shrink:0}
.main{flex:1;padding:14px 18px;min-width:0;overflow-x:auto}
.section{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:14px}
.section h3{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:3px;letter-spacing:.2px}
.field .help{font-size:10px;color:#4a6080;margin-left:5px}
.field .row{display:flex;align-items:center;gap:5px}
.field .suffix{color:var(--muted);font-size:12px;white-space:nowrap}
.cards{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 14px;flex:1 1 180px;min-width:150px}
.card.highlight{background:linear-gradient(135deg,#0a2a1a,#0d2520);border-color:#1a5a3a}
.card .k{font-size:11px;color:var(--muted);margin-bottom:3px;letter-spacing:.2px}
.card .v{font-size:19px;font-weight:700;font-variant-numeric:tabular-nums}
.card .sub{font-size:10px;color:#4a7a6a;margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:12px;font-variant-numeric:tabular-nums}
th{padding:7px 8px;text-align:right;color:var(--accent);font-weight:600;font-size:10px;letter-spacing:.3px;white-space:nowrap;position:sticky;top:0;background:#0e192c;z-index:1}
th:first-child{text-align:left}
td{padding:6px 8px;text-align:right;border-bottom:1px solid #0e1a2a}
td:first-child{text-align:left}
.tbl-wrap{overflow:auto;max-height:500px;border:1px solid var(--border);border-radius:10px}
.row-best{background:rgba(45,220,111,.05)}
.row-best td:first-child{color:var(--green);font-weight:700}
.row-maxnet{background:rgba(77,174,255,.04)}
.row-maxnet td:first-child{color:var(--cyan);font-weight:700}
.bar-row{display:flex;align-items:center;gap:7px;margin-bottom:2px}
.bar-label{width:36px;font-size:11px;text-align:right;flex-shrink:0;color:var(--muted)}
.bar-track{flex:1;height:16px;background:#0e1a2a;border-radius:3px;overflow:hidden;display:flex}
.bar-seg{height:100%;transition:width .3s}
.bar-val{width:80px;font-size:11px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
.chart-svg{width:100%;height:260px;display:block}
.legend{display:flex;gap:14px;font-size:11px;color:var(--muted);margin-top:6px;flex-wrap:wrap}
.legend .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:4px;vertical-align:middle}
.note{margin-top:18px;padding:11px 14px;background:#0a0f1a;border:1px solid #141e2a;border-radius:8px;font-size:11px;color:#3e5570;line-height:1.5}
.rec{margin-top:16px;padding:12px 16px;background:rgba(45,220,111,.04);border:1px solid #1a4a2a;border-radius:8px;font-size:13px;line-height:1.6}
@media(max-width:1100px){.layout{flex-wrap:wrap}.sidebar{width:100%;max-height:none;border-right:none;border-bottom:1px solid var(--border)}}
</style>
</head>
<body>

<div class="header">
<h1>⚡ VERO-OPTIMOIJA v2</h1>
<p>Listaamattoman osakeyhtiön purkaminen vs. osingonjako — vakuutuskuorimalli, 2 osakasta</p>
<div class="tabs" id="tabs"></div>
</div>

<div class="layout">
<div class="sidebar" id="sidebar"></div>
<div class="main" id="main"></div>
</div>

<script>
// ═══════════════════════════════════════════
// CALCULATION ENGINE (from version 2, enhanced)
// ═══════════════════════════════════════════

function clamp(v,a,b){return Math.max(a,Math.min(b,v))}

function capitalTax(x){x=Math.max(0,x);return Math.min(x,30000)*0.30+Math.max(0,x-30000)*0.34}
function incrCapitalTax(base,add){return Math.max(0,capitalTax(base+Math.max(0,add))-capitalTax(base))}

function earnedTaxSimple(total){
  const brackets=[20500,31100,51600,88200,150000];
  const rates=[0,0.06,0.1725,0.2125,0.3125,0.4375];
  let tax=0,prev=0;
  const levels=[...brackets,Infinity];
  for(let i=0;i<levels.length;i++){
    if(total>prev)tax+=Math.max(0,Math.min(total,levels[i])-prev)*rates[i];
    prev=levels[i];if(total<=levels[i])break;
  }
  if(total>20500)tax+=(total-20500)*0.086;
  return Math.max(0,tax);
}
function incrEarnedTax(base,add){return Math.max(0,earnedTaxSimple(base+Math.max(0,add))-earnedTaxSimple(base))}

// How much to withdraw from wrapper to get `needNet` cash after corp tax on realised gain
function withdrawalForNet(needNet,mv,bv,corpRate){
  if(needNet<=0)return{wd:0,gain:0,tax:0,ratio:mv>0?clamp((mv-bv)/mv,0,1):0};
  if(mv<=0)return{wd:1e18,gain:0,tax:0,ratio:0};
  const ratio=clamp((mv-bv)/mv,0,1);
  const denom=1-corpRate*ratio;
  if(denom<=0)return{wd:1e18,gain:0,tax:0,ratio};
  const wd=needNet/denom;
  const gain=wd*ratio;
  return{wd,gain,tax:gain*corpRate,ratio};
}

// Binary search: max dividend company can pay given state
function maxDividendPossible(mv,bv,distributable,liabilities,expenses,corpRate){
  let lo=0,hi=Math.max(0,mv);
  for(let i=0;i<60;i++){
    const mid=(lo+hi)/2;
    const need=mid+expenses;
    const w=withdrawalForNet(need,mv,bv,corpRate);
    const afterTaxGain=w.gain-w.tax;
    const endDistrib=distributable+afterTaxGain-expenses-mid;
    const endMv=mv-w.wd;
    const endBv=mv>0?bv*(1-w.wd/mv):0;
    const endEquity=endMv-liabilities;
    const ok=isFinite(w.wd)&&w.wd<=mv+1e-6&&endDistrib>=-1e-6&&endBv>=-1e-6&&endEquity>=-1e-6;
    if(ok)lo=mid;else hi=mid;
  }
  return Math.max(0,lo);
}

function dividendTaxForShareholder(shareDiv,ownership,netAssetsBefore,sh){
  const capLimit=Math.max(0,netAssetsBefore*0.08)*ownership;
  const capPortion=Math.min(shareDiv,capLimit);
  const earnedPortion=Math.max(0,shareDiv-capLimit);
  const capStd=Math.min(capPortion,150000);
  const capHigh=Math.max(0,capPortion-150000);
  const taxableCapital=capStd*0.25+capHigh*0.85;
  const taxableEarned=earnedPortion*0.75;
  const capTax=incrCapitalTax(sh.otherCapital,taxableCapital);
  const earnedTax=incrEarnedTax(sh.otherEarned,taxableEarned);
  return{capPortion,earnedPortion,taxableCapital,taxableEarned,capTax,earnedTax,totalTax:capTax+earnedTax};
}

function liquidationTaxForShareholder(distribution,extraCapitalAlready,sh,yearsElapsed){
  const oy=sh.ownershipYearsNow+yearsElapsed;
  const hmoRate=oy>=10?0.40:0.20;
  const gainActual=Math.max(0,distribution-sh.acquisitionCost);
  const gainHmo=Math.max(0,distribution-distribution*hmoRate);
  const selectedGain=Math.min(gainActual,gainHmo);
  const method=gainActual<=gainHmo?'Todellinen':'HMO '+Math.round(hmoRate*100)+'%';
  const tax=capitalTax(sh.otherCapital+extraCapitalAlready+selectedGain)-capitalTax(sh.otherCapital+extraCapitalAlready);
  return{ownershipYears:oy,hmoRate,gainActual,gainHmo,selectedGain,method,tax:Math.max(0,tax),net:distribution-Math.max(0,tax)};
}

// Full simulation for a given liquidation year
function simulate(inputs,liqYear){
  const cr=inputs.corpRate;
  const state={mv:inputs.marketValue,bv:inputs.bookValue,distrib:inputs.distributable,liab:inputs.liabilities};
  const yearly=[];
  let totGrossDiv=0,totDivTax=0,totCorpTax=0,totExpenses=0;
  let accCapTaxThisYear=[0,0]; // for liquidation year progression

  for(let y=1;y<=liqYear;y++){
    const startMv=state.mv;
    state.mv*=(1+inputs.returnRate);
    const netAssetsBefore=state.mv-state.liab;
    const maxDiv=maxDividendPossible(state.mv,state.bv,state.distrib,state.liab,inputs.expenses,cr);
    const actualDiv=Math.min(inputs.annualDiv,maxDiv);
    const need=actualDiv+inputs.expenses;
    const w=withdrawalForNet(need,state.mv,state.bv,cr);
    const afterTaxGain=w.gain-w.tax;
    const bvBefore=state.bv;
    state.mv-=w.wd;
    state.bv=startMv*(1+inputs.returnRate)>0?bvBefore*(1-w.wd/(startMv*(1+inputs.returnRate))):0;
    state.distrib+=afterTaxGain-inputs.expenses-actualDiv;

    const shRows=inputs.shareholders.map((sh,idx)=>{
      const sd=actualDiv*sh.ownership;
      const t=dividendTaxForShareholder(sd,sh.ownership,netAssetsBefore,sh);
      if(y===liqYear)accCapTaxThisYear[idx]=t.taxableCapital;
      return{grossDiv:sd,...t};
    });
    const yearDivTax=shRows.reduce((s,r)=>s+r.totalTax,0);
    totGrossDiv+=actualDiv;totDivTax+=yearDivTax;totCorpTax+=w.tax;totExpenses+=inputs.expenses;

    yearly.push({
      year:y,startMv,mvAfterReturn:startMv*(1+inputs.returnRate),
      withdrawal:w.wd,realisedGain:w.gain,corpTax:w.tax,gainRatio:w.ratio,
      expenses:inputs.expenses,actualDiv,dividendTax:yearDivTax,
      endMv:state.mv,endBv:state.bv,endNetAssets:state.mv-state.liab,
      distributable:state.distrib,shRows
    });
  }

  // Liquidation
  const unrealised=Math.max(0,state.mv-state.bv);
  const liqCorpTax=unrealised*cr;
  totCorpTax+=liqCorpTax;
  const liqPool=Math.max(0,state.mv-liqCorpTax-state.liab);
  const shLiq=inputs.shareholders.map((sh,idx)=>{
    const dist=liqPool*sh.ownership;
    return{distribution:dist,...liquidationTaxForShareholder(dist,accCapTaxThisYear[idx],sh,liqYear)};
  });
  const liqShTax=shLiq.reduce((s,r)=>s+r.tax,0);
  const totalNet=totGrossDiv+liqPool-totDivTax-liqShTax;
  const effRate=(totGrossDiv+liqPool)>0?(totDivTax+liqShTax)/(totGrossDiv+liqPool):0;
  const allInRate=(totGrossDiv+liqPool)>0?(totDivTax+liqShTax+totCorpTax)/(totGrossDiv+liqPool):0;

  return{
    liqYear,yearly,
    preLiqNetAssets:state.mv-state.liab,unrealised,liqCorpTax,liqPool,shLiq,
    totGrossDiv,totDivTax,totCorpTax,totExpenses,liqShTax,
    totalNet,effRate,allInRate
  };
}

function pickRecommendation(results){
  if(!results.length)return results[0];
  for(let i=0;i<results.length-1;i++){
    if((results[i].effRate-results[i+1].effRate)<=0.005)return results[i];
  }
  return results.reduce((a,b)=>a.effRate<=b.effRate?a:b);
}

// ═══════════════════════════════════════════
// UI RENDERING
// ═══════════════════════════════════════════

const eur=n=>Math.round(n||0).toLocaleString('fi-FI')+' €';
const pct=n=>((n||0)*100).toFixed(1)+' %';

const DEFAULTS={
  marketValue:1300000,bookValue:1000000,liabilities:0,distributable:900000,
  annualDiv:50000,expenses:6000,returnRate:4.5,corpRate:20,years:20,
  sh1Own:50,sh1Cost:25000,sh1Earned:0,sh1Capital:0,sh1Years:12,
  sh2Own:50,sh2Cost:25000,sh2Earned:0,sh2Capital:0,sh2Years:12,
};

let P={...DEFAULTS};
let activeTab='comparison';
let results=[];
let best=null;
let bestNet=null;

function collectInputs(){
  const s1=P.sh1Own/100,s2=P.sh2Own/100,sum=s1+s2||1;
  return{
    marketValue:P.marketValue,bookValue:P.bookValue,liabilities:P.liabilities,
    distributable:P.distributable,annualDiv:P.annualDiv,expenses:P.expenses,
    returnRate:P.returnRate/100,corpRate:P.corpRate/100,years:Math.max(0,Math.round(P.years)),
    shareholders:[
      {ownership:s1/sum,acquisitionCost:P.sh1Cost,otherEarned:P.sh1Earned,otherCapital:P.sh1Capital,ownershipYearsNow:P.sh1Years,label:'Osakas 1'},
      {ownership:s2/sum,acquisitionCost:P.sh2Cost,otherEarned:P.sh2Earned,otherCapital:P.sh2Capital,ownershipYearsNow:P.sh2Years,label:'Osakas 2'}
    ]
  };
}

function recalc(){
  const inp=collectInputs();
  results=[];
  for(let y=0;y<=inp.years;y++)results.push(simulate(inp,y));
  best=pickRecommendation(results);
  bestNet=results.reduce((a,b)=>a.totalNet>=b.totalNet?a:b);
  render();
}

function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  });
  children.flat(9).forEach(c=>{if(c!=null)el.append(typeof c==='string'||typeof c==='number'?document.createTextNode(c):c)});
  return el;
}

function field(label,key,suffix,step,helpText){
  const d=h('div',{class:'field'},
    h('label',null,label,helpText?h('span',{class:'help'},'('+helpText+')'):''),
    h('div',{class:'row'},
      h('input',{type:'number',value:P[key],step:step||1,onInput:e=>{P[key]=parseFloat(e.target.value)||0;recalc()}}),
      suffix?h('span',{class:'suffix'},suffix):''
    )
  );
  return d;
}

function renderSidebar(){
  const sb=document.getElementById('sidebar');
  sb.innerHTML='';

  const sec=(title,icon,...children)=>{
    const s=h('div',{class:'section'},h('h3',null,icon+' '+title),...children);
    sb.appendChild(s);
  };

  sec('Vakuutuskuori','📊',
    field('Sijoitusten kirjanpitoarvo','bookValue','€',10000,'taseessa'),
    field('Sijoitusten käypä arvo','marketValue','€',10000,'markkina-arvo'),
    h('div',{style:{padding:'7px 9px',background:'#0a1628',borderRadius:'6px',fontSize:'11px',color:'#5a8aaa',lineHeight:'1.5',marginTop:'4px'}},
      'Realisoitumaton: '+eur(P.marketValue-P.bookValue))
  );

  sec('Yhtiön tase','🏢',
    field('Velat','liabilities','€',1000),
    field('Jakokelpoinen vapaa pääoma','distributable','€',10000,'rajoittaa osinkoja')
  );

  sec('Osakas 1','👤',
    field('Omistusosuus','sh1Own','%',1),
    field('Hankintahinta','sh1Cost','€',1000),
    field('Muut ansiotulot','sh1Earned','€/v',1000),
    field('Muut pääomatulot','sh1Capital','€/v',1000),
    field('Omistusaika','sh1Years','v',1)
  );

  sec('Osakas 2','👤',
    field('Omistusosuus','sh2Own','%',1),
    field('Hankintahinta','sh2Cost','€',1000),
    field('Muut ansiotulot','sh2Earned','€/v',1000),
    field('Muut pääomatulot','sh2Capital','€/v',1000),
    field('Omistusaika','sh2Years','v',1)
  );

  sec('Osinko & sijoitus','💰',
    field('Vuosiosinko yhteensä','annualDiv','€',5000),
    field('Yhtiön vuosikulut','expenses','€',500),
    field('Sijoitustuotto','returnRate','%',0.5),
    field('Yhteisövero','corpRate','%',1),
    field('Simulointijakso','years','v',1)
  );
}

function renderTabs(){
  const tabs=document.getElementById('tabs');
  tabs.innerHTML='';
  [{id:'comparison',l:'Vertailu'},{id:'yearly',l:'Osinkoerittely'},{id:'liquidation',l:'Purkaminen'},{id:'hybrid',l:'Hybridi-optimointi'}].forEach(t=>{
    const btn=h('button',{class:'tab'+(activeTab===t.id?' active':''),onClick:()=>{activeTab=t.id;render()}},t.l);
    tabs.appendChild(btn);
  });
}

function card(k,v,sub,cls){
  return h('div',{class:'card'+(cls?' '+cls:'')},
    h('div',{class:'k'},k),
    h('div',{class:'v',style:{color:cls==='highlight'?'#2ddc6f':cls==='blue'?'#4daeff':'#d8e4f0'}},v),
    sub?h('div',{class:'sub'},sub):''
  );
}

function tableEl(headers,rows){
  const t=h('table',null,
    h('thead',null,h('tr',null,...headers.map((hd,i)=>h('th',{style:{textAlign:i===0?'left':'right'}},hd)))),
    h('tbody',null,...rows)
  );
  const wrap=h('div',{class:'tbl-wrap'},t);
  return wrap;
}

function renderComparison(){
  const m=document.getElementById('main');m.innerHTML='';
  if(!results.length)return;

  m.appendChild(h('h2',{style:{fontSize:'15px',color:'#e0f0ff',marginBottom:'14px'}},'Strategioiden vertailu'));

  const imm=results[0];
  m.appendChild(h('div',{class:'cards'},
    card('Välitön purkaminen',eur(imm.totalNet),'Vero: '+pct(imm.effRate),''),
    card('Vero-optimaalinen purku',best.liqYear===0?'Heti':best.liqYear+'v','Eff. vero: '+pct(best.effRate)+' | Netto: '+eur(best.totalNet),'highlight'),
    card('Paras nettosaanto',eur(bestNet.totalNet),bestNet.liqYear+'v osinkoa → purku | Vero: '+pct(bestNet.effRate),'blue')
  ));

  const hdrs=['Purku-vuosi','Osingot brutto','Purkujako','Osinko-verot','Purku-vero','Yhteisö-verot','Eff. vero','All-in','Nettosaanto'];
  const rows=results.map(r=>{
    const isBest=r.liqYear===best.liqYear;
    const isMaxNet=r.liqYear===bestNet.liqYear&&r.liqYear!==best.liqYear;
    const tr=h('tr',{class:isBest?'row-best':(isMaxNet?'row-maxnet':'')},
      h('td',null,(r.liqYear===0?'Heti':r.liqYear+'v')+(isBest?' ★':'')+(isMaxNet?' ◆':'')),
      h('td',null,eur(r.totGrossDiv)),
      h('td',null,eur(r.liqPool)),
      h('td',{style:{color:'var(--orange)'}},eur(r.totDivTax)),
      h('td',{style:{color:'var(--orange)'}},eur(r.liqShTax)),
      h('td',{style:{color:'var(--red)'}},eur(r.totCorpTax)),
      h('td',null,pct(r.effRate)),
      h('td',null,pct(r.allInRate)),
      h('td',{style:{fontWeight:700,color:isBest?'var(--green)':(isMaxNet?'var(--cyan)':'var(--text)')}},eur(r.totalNet))
    );
    return tr;
  });

  m.appendChild(tableEl(hdrs,rows));

  // Recommendation
  const rec=h('div',{class:'rec'});
  rec.innerHTML='<strong style="color:#2ddc6f">★ Vero-optimaalinen purkuajankohta:</strong> '+
    (best.liqYear===0
      ?'Veroprosentti ei enää laske merkittävästi — yhtiön voi purkaa heti. Eff. vero: '+pct(best.effRate)+', netto: '+eur(best.totalNet)+'.'
      :'Jaa osinkoja '+best.liqYear+' vuotta ('+eur(P.annualDiv)+'/v), sitten purka yhtiö. Eff. vero: '+pct(best.effRate)+', netto: '+eur(best.totalNet)+'. Tämän jälkeen veroprosentti ei enää laske merkittävästi (<0,5 %-yks./v).');
  if(bestNet.liqYear!==best.liqYear){
    rec.innerHTML+='<br><strong style="color:#4daeff">◆ Paras nettosaanto:</strong> '+bestNet.liqYear+'v osinkoa → purku. Netto: '+eur(bestNet.totalNet)+' ('+pct(bestNet.effRate)+'). Lisäodotus tuottaa '+eur(bestNet.totalNet-best.totalNet)+' enemmän.';
  }
  m.appendChild(rec);

  m.appendChild(h('div',{class:'note'},'⚠️ Tämä laskelma on arvio eikä korvaa veroasiantuntijan neuvoja. Ansiotuloveron laskenta on yksinkertaistettu. Todellinen verotus riippuu kunnallisveroprosentista, vähennyksistä ja muista tekijöistä.'));
}

function renderYearly(){
  const m=document.getElementById('main');m.innerHTML='';
  if(!best||!best.yearly.length)return;

  const scenario=best;
  m.appendChild(h('h2',{style:{fontSize:'15px',color:'#e0f0ff',marginBottom:'6px'}},'Osinkoerittely — suositeltu skenaario ('+scenario.liqYear+'v)'));
  m.appendChild(h('p',{style:{fontSize:'12px',color:'var(--muted)',marginBottom:'14px'}},'Vuosittainen erittely osinkojen verotuksesta ja yhtiön tilanteesta.'));

  const inp=collectInputs();
  m.appendChild(h('div',{class:'cards'},
    card('Todellinen nettovarallisuus',eur(P.marketValue-P.liabilities),'sis. realisoitumaton '+eur(P.marketValue-P.bookValue)),
    card('8% raja (osinko)',eur((P.marketValue-P.liabilities)*0.08)),
    card('Jakokelpoinen',eur(P.distributable)),
    card('Vuosiosinko',eur(P.annualDiv))
  ));

  const hdrs=['Vuosi','Kuoren arvo','Nosto','Real. voitto','Yht.vero','Osinko','Os.1 vero','Os.2 vero','Jakokelpoiset','Nettovarat'];
  const rows=scenario.yearly.map(y=>{
    const sh1Tax=y.shRows[0]?y.shRows[0].totalTax:0;
    const sh2Tax=y.shRows[1]?y.shRows[1].totalTax:0;
    return h('tr',null,
      h('td',null,y.year),
      h('td',null,eur(y.mvAfterReturn)),
      h('td',null,eur(y.withdrawal)),
      h('td',{style:{color:'var(--muted)'}},eur(y.realisedGain)),
      h('td',{style:{color:'var(--red)'}},eur(y.corpTax)),
      h('td',{style:{fontWeight:600}},eur(y.actualDiv)),
      h('td',{style:{color:'var(--orange)'}},eur(sh1Tax)),
      h('td',{style:{color:'var(--orange)'}},eur(sh2Tax)),
      h('td',null,eur(y.distributable)),
      h('td',null,eur(y.endNetAssets))
    );
  });
  m.appendChild(tableEl(hdrs,rows));

  // Summary
  const s=h('div',{class:'section',style:{marginTop:'14px',fontSize:'12px',lineHeight:'1.8'}});
  s.innerHTML='<strong style="color:var(--accent)">Yhteenveto '+scenario.liqYear+'v jälkeen:</strong><br>'+
    'Osingot yhteensä (brutto): '+eur(scenario.totGrossDiv)+'<br>'+
    'Osinkoverot: '+eur(scenario.totDivTax)+'<br>'+
    'Yhteisöverot (kuoren nostot): '+eur(scenario.totCorpTax-scenario.liqCorpTax)+'<br>'+
    'Jäljellä olevan kuoren arvo: '+eur(scenario.yearly.length?scenario.yearly[scenario.yearly.length-1].endMv:P.marketValue);
  m.appendChild(s);
}

function renderLiquidation(){
  const m=document.getElementById('main');m.innerHTML='';

  m.appendChild(h('h2',{style:{fontSize:'15px',color:'#e0f0ff',marginBottom:'6px'}},'Purkaminen — eri ajankohtina'));
  m.appendChild(h('p',{style:{fontSize:'12px',color:'var(--muted)',marginBottom:'14px'}},'Osingot jaetaan vuosittain ennen purkua. Purkuhetkellä kuoren jäljellä oleva arvonnousu realisoituu.'));

  const oy=P.sh1Years;
  m.appendChild(h('div',{class:'cards'},
    card('HMO',oy>=10?'40 %':'20 %','Omistusaika: '+oy+'v'),
    card('Hankintahinta os.1',eur(P.sh1Cost)),
    card('Hankintahinta os.2',eur(P.sh2Cost)),
    card('Realisoitumaton',eur(P.marketValue-P.bookValue))
  ));

  const hdrs=['Vuosi','Nettovarat','Osingot kum.','Purkujako','Luov.voitto os.1','Metodi','Purkuvero','Eff. %','Netto yht.'];
  const rows=results.map(r=>{
    const g1=r.shLiq[0]||{};
    return h('tr',null,
      h('td',null,r.liqYear===0?'Heti':r.liqYear+'v'),
      h('td',null,eur(r.preLiqNetAssets)),
      h('td',{style:{color:'#6aaacc'}},eur(r.totGrossDiv)),
      h('td',null,eur(r.liqPool)),
      h('td',null,eur(g1.selectedGain||0)),
      h('td',{style:{color:g1.method&&g1.method.startsWith('HMO')?'var(--green)':'var(--orange)',fontSize:'11px'}},g1.method||''),
      h('td',{style:{color:'var(--red)'}},eur(r.liqShTax)),
      h('td',null,pct(r.effRate)),
      h('td',{style:{fontWeight:600,color:'var(--green)'}},eur(r.totalNet))
    );
  });
  m.appendChild(tableEl(hdrs,rows));

  const notes=h('div',{class:'section',style:{marginTop:'14px',fontSize:'12px',lineHeight:'1.8'}});
  notes.innerHTML='<strong style="color:var(--accent)">Huomioita:</strong><br>'+
    '• Vuosittaiset osingot jaetaan ennen purkua<br>'+
    '• Purkutilanteessa jako-osuus verotetaan luovutusvoittona<br>'+
    '• HMO 40 % kun omistusaika ≥ 10v, muuten 20 %<br>'+
    '• Purkuvuoden osinkojen pääomatulo vaikuttaa purkuveron progressioon<br>'+
    '• Netto yht. = osingot netto + purkujako netto';
  m.appendChild(notes);
}

function renderHybrid(){
  const m=document.getElementById('main');m.innerHTML='';

  m.appendChild(h('h2',{style:{fontSize:'15px',color:'#e0f0ff',marginBottom:'6px'}},'Hybridistrategia — osingot + purku'));
  m.appendChild(h('p',{style:{fontSize:'12px',color:'var(--muted)',marginBottom:'14px'}},'Visuaalinen vertailu: osingot N vuotta, sitten purku.'));

  m.appendChild(h('div',{class:'cards'},
    card('Vero-optimaalinen',best.liqYear===0?'Heti':best.liqYear+'v','Eff. vero: '+pct(best.effRate)+' | Netto: '+eur(best.totalNet),'highlight'),
    card('Paras nettosaanto',eur(bestNet.totalNet),bestNet.liqYear+'v → purku | '+pct(bestNet.effRate),'blue')
  ));

  // Bar chart
  const barContainer=h('div',{style:{marginBottom:'16px'}});
  const maxVal=bestNet.totalNet*1.05||1;
  results.forEach(r=>{
    const isBest=r.liqYear===best.liqYear;
    const isMaxNet=r.liqYear===bestNet.liqYear;
    const divNet=r.totGrossDiv-r.totDivTax;
    const liqNet=r.liqPool-r.liqShTax;
    const divW=Math.max(0,divNet/maxVal*100);
    const liqW=Math.max(0,liqNet/maxVal*100);
    const color=isBest?'var(--green)':(isMaxNet?'var(--cyan)':'var(--muted)');
    barContainer.appendChild(h('div',{class:'bar-row'},
      h('div',{class:'bar-label',style:{color}},r.liqYear===0?'Heti':r.liqYear+'v'),
      h('div',{class:'bar-track'},
        h('div',{class:'bar-seg',style:{width:divW+'%',background:'#1a5580'}}),
        h('div',{class:'bar-seg',style:{width:liqW+'%',background:isBest?'#1a6a3a':'#134a2a'}})
      ),
      h('div',{class:'bar-val',style:{color,fontWeight:isBest||isMaxNet?700:400}},eur(r.totalNet))
    ));
  });
  m.appendChild(barContainer);

  m.appendChild(h('div',{class:'legend'},
    h('span',null,h('span',{class:'dot',style:{background:'#1a5580'}}),'Osingot netto'),
    h('span',null,h('span',{class:'dot',style:{background:'#1a6a3a'}}),'Purkujako netto')
  ));

  // SVG chart
  const chartDiv=h('div',{style:{marginTop:'20px'}});
  const svgW=800,svgH=260,pad={l:60,r:20,t:16,b:32};
  const xs=results.map(r=>r.liqYear);
  const ys=results.map(r=>r.totalNet);
  const effs=results.map(r=>r.effRate);
  const minY=Math.min(0,...ys),maxY=Math.max(...ys)||1;
  const minE=Math.min(...effs),maxE=Math.max(...effs)||1;
  const sx=x=>pad.l+(x/Math.max(1,Math.max(...xs)))*(svgW-pad.l-pad.r);
  const sy=y=>svgH-pad.b-((y-minY)/(maxY-minY||1))*(svgH-pad.t-pad.b);
  const se=e=>svgH-pad.b-((e-minE)/(maxE-minE||1))*(svgH-pad.t-pad.b);

  let gridSvg='';
  for(let i=0;i<=4;i++){
    const v=minY+(maxY-minY)*(i/4);
    const yy=sy(v);
    gridSvg+=`<line x1="${pad.l}" y1="${yy}" x2="${svgW-pad.r}" y2="${yy}" stroke="#1a2a42" />`;
    gridSvg+=`<text x="4" y="${yy+4}" fill="#5a7a9a" font-size="10">${Math.round(v/1000)}k</text>`;
  }
  const pts1=results.map(r=>`${sx(r.liqYear)},${sy(r.totalNet)}`).join(' ');
  const pts2=results.map(r=>`${sx(r.liqYear)},${se(r.effRate)}`).join(' ');
  let xLabels='';
  results.filter((_,i)=>i%Math.max(1,Math.floor(results.length/10))===0||i===results.length-1).forEach(r=>{
    xLabels+=`<text x="${sx(r.liqYear)}" y="${svgH-6}" fill="#5a7a9a" font-size="10" text-anchor="middle">${r.liqYear}</text>`;
  });

  const svg=`<svg viewBox="0 0 ${svgW} ${svgH}" class="chart-svg">${gridSvg}
    <polyline fill="none" stroke="#2ddc6f" stroke-width="2.5" points="${pts1}"/>
    <polyline fill="none" stroke="#f0a030" stroke-width="1.5" stroke-dasharray="4 3" points="${pts2}"/>
    ${results.map(r=>`<circle cx="${sx(r.liqYear)}" cy="${sy(r.totalNet)}" r="3" fill="#2ddc6f"/>`).join('')}
    ${xLabels}</svg>`;
  chartDiv.innerHTML=svg;
  m.appendChild(chartDiv);

  m.appendChild(h('div',{class:'legend'},
    h('span',null,h('span',{class:'dot',style:{background:'#2ddc6f'}}),'Nettosaanto'),
    h('span',null,h('span',{class:'dot',style:{background:'#f0a030'}}),'Eff. veroprosentti')
  ));
}

function render(){
  renderTabs();
  if(activeTab==='comparison')renderComparison();
  else if(activeTab==='yearly')renderYearly();
  else if(activeTab==='liquidation')renderLiquidation();
  else renderHybrid();
}

renderSidebar();
recalc();
</script>
